<svg width="800" height="800" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle - Deep luxury dark -->
  <circle cx="50" cy="50" r="48" stroke="#C8860A" stroke-width="2" fill="#0D0A06"/>
  
  <!-- Central Icon: Combined Honey Drop & Palm Silhouette -->
  <path d="M50 15C55 32 68 38 50 68C32 38 45 32 50 15Z" fill="url(#honey_grad)"/>
  
  <!-- Stylized Palm Fronds (Gives the "Paradise/Jannatayn" feel) -->
  <path d="M30 52C30 52 40 45 50 45C60 45 70 52 70 52" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M35 42C35 42 42 38 50 38C58 38 65 42 65 42" stroke="#C8860A" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Luxury Branding Text -->
  <text x="50" y="82" text-anchor="middle" fill="#FFD700" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="900" font-size="10" letter-spacing="1.5">ALHARTH</text>
  <text x="50" y="93" text-anchor="middle" fill="#C8860A" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="bold" font-size="5" letter-spacing="2">ARDH AL-JANNATAYN</text>
  
  <!-- Gradients & Shadows -->
  <defs>
    <linearGradient id="honey_grad" x1="50" y1="15" x2="50" y2="68" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD700"/>
      <stop offset="1" stop-color="#C8860A"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="100" height="100">
      <stop offset="0" stop-color="#FFD700" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#C8860A" stop-opacity="0"/>
    </filter>
  </defs>
</svg>
