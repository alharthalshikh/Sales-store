<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8860A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)" />
  
  <!-- Bee Graphic -->
  <g transform="translate(128, 128) scale(0.5)">
    <!-- Wings -->
    <ellipse cx="180" cy="180" rx="100" ry="150" fill="white" opacity="0.4" transform="rotate(-30, 256, 256)"/>
    <ellipse cx="332" cy="180" rx="100" ry="150" fill="white" opacity="0.4" transform="rotate(30, 256, 256)"/>
    
    <!-- Body -->
    <path d="M256 120c-60 0-100 40-100 100 0 80 40 160 100 160s100-80 100-160c0-60-40-100-100-100z" fill="#000" />
    <!-- Yellow Stripes -->
    <path d="M165 240h182" stroke="#FFD700" stroke-width="30" />
    <path d="M165 300h182" stroke="#FFD700" stroke-width="30" />
    
    <!-- Eyes and Antennas -->
    <circle cx="220" cy="180" r="15" fill="#fff" />
    <circle cx="292" cy="180" r="15" fill="#fff" />
    <path d="M200 120l-40-60M312 120l40-60" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Honey Drip Detail -->
  <path d="M256 360c-20 0-36 16-36 36s16 36 36 36 36-16 36-36-16-36-36-36z" fill="#FFD700" />
</svg>
